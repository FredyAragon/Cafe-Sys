version: '3.9'

services:

  db:
    image: postgres:17
    container_name: cafesys_db

    environment:
      POSTGRES_DB: cafeteriadb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./BD/cafeteriadb.sql:/docker-entrypoint-initdb.d/cafeteriadb.sql

  backend:
    build:
      context: ./Backend

    container_name: cafesys_backend

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - ./Backend:/app

    ports:
      - "8000:8000"

    depends_on:
      - db

volumes:
  postgres_data: