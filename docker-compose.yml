services:

  backend:
    build:
      context: ./backend
    container_name: cafesys_backend

    command: >
          sh -c "python manage.py migrate &&
          python -m apps.core.create_superuser &&
          python manage.py runserver 0.0.0.0:8081"

    volumes:
      - ./backend:/app
    ports:
      - "8081:8081"
    env_file:
      - ./backend/.env
