services:

  db:
    image: postgres:16
    container_name: cafesys_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: cafesys
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: cafesys_backend

    command: >
      sh -c "
      python manage.py migrate &&
      python -m apps.core.create_superuser &&
      python manage.py runserver 0.0.0.0:8081
      "

    volumes:
      - ./backend:/app

    ports:
      - "8081:8081"

    env_file:
      - ./backend/.env

    depends_on:
      - db

  frontend:
    build:
      context: ./frontend

    container_name: cafesys_frontend

    command: >
      sh -c "
      npm install &&
      npx ng serve --host 0.0.0.0 --port 8082
      "

    volumes:
      - ./frontend:/app
      - /app/node_modules

    ports:
      - "8082:8082"

volumes:
  postgres_data: