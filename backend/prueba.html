<!DOCTYPE html>
<html>
<head>
    <title>Prueba CORS</title>
</head>
<body>

<button onclick="cargarProductos()">
    Consumir API
</button>

<script>
async function cargarProductos() {

    const response = await fetch(
        "http://localhost:8081/api/products/"
    );

    const data = await response.json();

    console.log(data);

    alert(
        "Productos obtenidos: " +
        data.length
    );
}
</script>

</body>
</html>
