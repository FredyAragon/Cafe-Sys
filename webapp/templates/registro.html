<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Café Python</title>
    <link rel="stylesheet" href="../static/css/global.css">
    <style>
        .auth-container { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .auth-container h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn-auth { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        .btn-auth:hover { background: #2ecc71; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="index.html" style="text-decoration:none;">
                <h1 class="logo">Café Python</h1>
            </a>
            
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="menu.html">Menú</a></li>
                    <li><a href="nosotros.html">Nosotros</a></li>
                    <li><a href="ubicacion.html">Ubicación</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                    
                    <li>
                        <a href="carrito.html">
                            🛒 <span id="contador-carrito" style="background:red; padding:2px 5px; border-radius:50%; font-size:0.8rem;">0</span>
                        </a>
                    </li>

                    <div id="nav-invitado" style="display:flex; gap:15px; margin-left:15px;">
                        <li><a href="login.html">Ingresar</a></li>
                        <li><a href="registro.html" style="background:#e67e22; padding:5px 10px; border-radius:4px;">Registro</a></li>
                    </div>

                    <div id="nav-usuario" style="display:none; gap:10px; align-items:center; margin-left:15px;">
                        <span class="user-display">👤 <span id="header-nombre-usuario">Usuario</span></span>
                        <button onclick="cerrarSesion()" class="btn-logout">Salir</button>
                    </div>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="auth-container">
            <h2>Crear Nueva Cuenta</h2>
            
            <form id="form-register" onsubmit="event.preventDefault(); procesarRegistro();">
                <div class="form-group">
                    <label for="reg-nombre">Nombre Completo:</label>
                    <input type="text" id="reg-nombre" name="nombre" required placeholder="Ej: Juan Pérez">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email:</label>
                    <input type="email" id="reg-email" name="email" required placeholder="juan@email.com">
                </div>
                <div class="form-group">
                    <label for="reg-pass">Contraseña:</label>
                    <input type="password" id="reg-pass" name="password" required placeholder="******">
                </div>
                <button type="submit" class="btn-auth">Registrarse Ahora</button>
            </form>

            <p class="toggle-link">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
            </p>
        </div>
    </main>

    <footer class="site-footer"><p>© 2025 Café Python</p></footer>
    
    <script type="module" src="../static/js/script.js"></script>
</body>
</html>
