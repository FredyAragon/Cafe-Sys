<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Carrito - Café Python</title>
    <link rel="stylesheet" href="../static/css/global.css">
    <style>
        .cart-container { max-width: 800px; margin: 40px auto; background: white; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        .total { text-align: right; font-size: 1.5rem; font-weight: bold; margin-top: 20px; color: #e67e22; }
        .btn-empty { background: #c0392b; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px;}
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="index.html" style="text-decoration:none;">
                <h1 class="logo">Café Python</h1>
            </a>
            
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="menu.html">Menú</a></li>
                    <li><a href="nosotros.html">Nosotros</a></li>
                    <li><a href="ubicacion.html">Ubicación</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                    
                    <li>
                        <a href="carrito.html">
                            🛒 <span id="contador-carrito" style="background:red; padding:2px 5px; border-radius:50%; font-size:0.8rem;">0</span>
                        </a>
                    </li>

                    <div id="nav-invitado" style="display:flex; gap:15px; margin-left:15px;">
                        <li><a href="login.html">Ingresar</a></li>
                        <li><a href="registro.html" style="background:#e67e22; padding:5px 10px; border-radius:4px;">Registro</a></li>
                    </div>

                    <div id="nav-usuario" style="display:none; gap:10px; align-items:center; margin-left:15px;">
                        <span class="user-display">👤 <span id="header-nombre-usuario">Usuario</span></span>
                        <button onclick="cerrarSesion()" class="btn-logout">Salir</button>
                    </div>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="cart-container">
            <h2>Tu Pedido</h2>
            <table id="cart-table">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                    </tr>
                </thead>
                <tbody id="cart-body">
                    </tbody>
            </table>
            <div class="total">Total: $<span id="cart-total">0.00</span></div>
            <br>
            <button onclick="vaciarCarrito()" class="btn-empty">Vaciar Carrito</button>
            <button onclick="finalizarCompra()" class="btn" style="float: right; background-color: #27ae60; color: white; border:none; padding: 12px 20px; font-size:1rem; cursor:pointer;">
                Confirmar Pedido
            </button>
        </div>
    </main>

    <footer class="site-footer"><p>© 2025 Café Python</p></footer>
    <script type="module" src="../static/js/script.js"></script>
</body>
</html>
