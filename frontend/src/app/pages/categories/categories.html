<div class="page-header">
  <h2>Gestión de Categorías</h2>
  <button class="btn-primary">➕ Nueva Categoría</button>
</div>

<div class="table-container">
  <table class="data-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let cat of categorias">
        <td>{{ cat.id }}</td>
        <td><strong>{{ cat.name }}</strong></td>
        <td>{{ cat.description }}</td>
        <td>
          <span class="badge" [ngClass]="cat.status === 'active' ? 'badge-active' : 'badge-inactive'">
            {{ cat.status === 'active' ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
        <td class="actions-cell">
          <button class="btn-icon edit" title="Editar">✏️</button>
          <button class="btn-icon delete" title="Eliminar">🗑️</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
