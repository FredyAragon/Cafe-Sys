<div class="app-container">
  <header class="main-header">
    <div class="logo-container">
      <a routerLink="/tienda" class="logo">☕ CafeSys</a>
    </div>

    <nav class="center-nav">
      <a routerLink="/tienda/menu" routerLinkActive="active">Menú</a>
      <a routerLink="/tienda/promociones" routerLinkActive="active">Promociones</a>
      <a routerLink="/tienda/nosotros" routerLinkActive="active">Nosotros</a>
      <a routerLink="/tienda/contacto" routerLinkActive="active">Contacto</a>
    </nav>

    <div class="right-actions">
      @if (usuario()) {
        <button class="cart-btn">
          🛒 Cesta <span class="badge">0</span>
        </button>
        <div class="user-dropdown">
          <span class="user-name">Hola, {{ usuario()!.firstName }}</span>
          <button (click)="cerrarSesion()" class="logout-text">Salir</button>
        </div>
      } @else {
        <a routerLink="/login" class="btn-outline">Ingresar</a>
        <a routerLink="/register" class="btn-solid">Registrarse</a>
      }
    </div>
  </header>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
  
  <footer class="main-footer">
    <div class="footer-info">
      <p>Arequipa, Perú</p>
      <p>+51 987 654 321</p>
      <p>hola&#64;cafesys.com</p>
    </div>
    <div class="footer-copy">
      <p>&copy; 2026 CafeSys - Armonía en cada taza.</p>
    </div>
  </footer>
</div>
