<div class="app-container">
  <header class="main-header">
    <div class="logo-container">
      <a routerLink="/tienda" class="logo">CafeSys</a>
    </div>

    <nav class="center-nav">
      @if (usuario()) {
        <a routerLink="/tienda/menu" routerLinkActive="active">Menú</a>
        <a routerLink="/tienda/mis-pedidos" routerLinkActive="active">Mis Pedidos</a>
        <a routerLink="/tienda/ubicacion" routerLinkActive="active">Ubicación</a>
        <a routerLink="/tienda/contacto" routerLinkActive="active">Contacto</a>
      }
    </nav>

    <div class="right-actions">
      @if (usuario()) {
        <a *ngIf="usuario()?.is_staff" routerLink="/admin/dashboard" class="btn-outline">Volver al admin</a>
        <a routerLink="/tienda/carrito" class="cart-btn">
          Cesta <span class="badge">{{ cartCount() }}</span>
        </a>
        <div class="user-dropdown">
          <span class="user-name">Hola, {{ usuario()!.firstName }}</span>
          <button (click)="cerrarSesion()" class="logout-text">Salir</button>
        </div>
      } @else {
        <a routerLink="/login" class="btn-outline">Ingresar</a>
        <a routerLink="/register" class="btn-solid">Registrarse</a>
      }
    </div>
  </header>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
  
  <footer class="main-footer">
    <div class="footer-info">
      <p>Arequipa, Perú</p>
      <p>+51 991 293 300</p>
      <p>hola&#64;cafesys.com</p>
    </div>
    <div class="footer-copy">
      <p>&copy; 2026 CafeSys - Armonía en cada taza.</p>
    </div>
  </footer>
</div>
