<div class="register-wrapper">
  <div class="register-card">
    <div class="register-header">
      <h2>Únete a CafeSys</h2>
      <p>Crea tu cuenta y descubre el equilibrio perfecto.</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
      
      <div class="form-row">
        <div class="form-group half">
          <label for="firstName">Nombre</label>
          <input type="text" id="firstName" formControlName="firstName" placeholder="Ej. Diego"
                 [class.is-invalid]="registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched">
        </div>
        
        <div class="form-group half">
          <label for="lastName">Apellido</label>
          <input type="text" id="lastName" formControlName="lastName" placeholder="Ej. Arce"
                 [class.is-invalid]="registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched">
        </div>
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" formControlName="email" placeholder="tu@correo.com"
               [class.is-invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
        <span class="error-text" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Ingresa un correo válido.
        </span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" formControlName="password" placeholder="••••••••"
               [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
        <span class="error-text" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Mínimo 6 caracteres.
        </span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input type="password" id="confirmPassword" formControlName="confirmPassword" placeholder="••••••••"
               [class.is-invalid]="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched">
        <span class="error-text" *ngIf="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched">
          Las contraseñas no coinciden.
        </span>
      </div>

      <button type="submit" class="btn-submit" [disabled]="registerForm.invalid">
        Crear Cuenta
      </button>
    </form>

    <div class="register-footer">
      <p>¿Ya tienes una cuenta? <a routerLink="/login" class="login-link">Ingresa aquí</a></p>
      <a routerLink="/tienda" class="back-link">← Volver a la tienda</a>
    </div>
  </div>
</div>
